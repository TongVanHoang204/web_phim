services:
  - type: web
    name: tsverse-backend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx playwright install chromium
    startCommand: npm --workspace vsmov-backend run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: CLIENT_URL
        value: https://tsverse.vercel.app
      - key: CORS_ORIGINS
        value: https://tsverse.vercel.app,http://localhost:5173,http://localhost:5174
      - key: ENABLE_HHKUNGFU_PLAYWRIGHT
        value: "true"

  - type: web
    name: tsverse-stream-extractor
    runtime: node
    plan: free
    rootDir: stream-extractor
    buildCommand: npm install && npx playwright install chromium
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXTRACTOR_TIMEOUT_MS
        value: "20000"
      - key: EXTRACTOR_REQUEST_TIMEOUT_MS
        value: "30000"
