services:
  - type: web
    name: tsverse-backend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm --workspace vsmov-backend run build
    startCommand: npm --workspace vsmov-backend run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: CLIENT_URL
        value: https://tsverse.vercel.app
      - key: CORS_ORIGINS
        value: https://tsverse.vercel.app,http://localhost:5173,http://localhost:5174
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/backend/ms-playwright
      - key: STREAM_EXTRACTOR_URL
        value: https://tsverse-stream-extractor.onrender.com
      - key: SCRAPER_SERVICE_URL
        value: https://tsverse-stream-extractor.onrender.com
      - key: STREAM_EXTRACTOR_TIMEOUT_MS
        value: "30000"
  - type: web
    name: tsverse-stream-extractor
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm --workspace tsverse-stream-extractor run build
    startCommand: npm --workspace tsverse-stream-extractor run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/stream-extractor/ms-playwright
      - key: KEEPALIVE_URL
        value: https://tsverse-stream-extractor.onrender.com/health
      - key: KEEPALIVE_INTERVAL_MS
        value: "300000"
