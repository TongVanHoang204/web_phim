services:
  - type: web
    name: tsverse-backend
    runtime: node
    plan: free
    buildCommand: PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/backend/ms-playwright npm install --include=dev && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/backend/ms-playwright npm --workspace vsmov-backend run build && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/backend/ms-playwright npx playwright install chromium
    startCommand: npm --workspace vsmov-backend run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: CLIENT_URL
        value: https://tsverse.vercel.app
      - key: CORS_ORIGINS
        value: https://tsverse.vercel.app,http://localhost:5173,http://localhost:5174
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/backend/ms-playwright
      - key: ENABLE_HHKUNGFU_PLAYWRIGHT
        value: "true"
